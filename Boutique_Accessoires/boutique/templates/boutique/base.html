<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Boutique{% endblock %}</title>
    <style>
        body { font-family: Arial; max-width: 1200px; margin: 0 auto; padding: 20px; }
        nav { background: #f4f4f4; padding: 15px; margin: 20px 0; text-align: center; }
        nav a { margin: 0 15px; text-decoration: none; color: #2c5aa0; font-weight: bold; }
    </style>
</head>
<body>
    <nav>
        <a href="{% url 'accueil' %}">Accueil</a>
        <a href="{% url 'liste_produits' %}">Produits</a>
        <a href="{% url 'contact' %}">Contact</a>
    </nav>

    {% block content %}
    {% endblock %}

    <footer style="text-align: center; margin-top: 40px; color: #666;">
        <p>&copy; 2025 Notre Boutique</p>
    </footer>
</body>
</html>
